name: Telegram Bot (24/7)

on:
  schedule:
    # Re-trigger every 5 hours to keep the bot alive (GitHub Actions max runtime = 6h)
    - cron: "0 */5 * * *"
  workflow_dispatch:   # Manual trigger anytime

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 290   # ~4h 50m — safely under 6h GitHub limit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy requests

      - name: Write .env file
        env:
          GMAIL_USER:       ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:       ${{ secrets.GMAIL_PASS }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PORTFOLIO_INR:    ${{ secrets.PORTFOLIO_INR }}
        run: |
          cat > .env << EOF
          GMAIL_USER=$GMAIL_USER
          GMAIL_PASS=$GMAIL_PASS
          TELEGRAM_TOKEN=$TELEGRAM_TOKEN
          TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID
          PORTFOLIO_INR=$PORTFOLIO_INR
          EOF

      - name: Run Telegram Bot (long-poll, 4h 45m)
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Run bot with a timeout so it exits cleanly before GitHub kills it
          timeout 17100 python telegram_bot.py || true
          echo "Bot exited cleanly. Next schedule will restart it."
